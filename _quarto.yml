project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"

website:
  title: "Evan M. Eastman"
  description: "Evan M. Eastman | Risk Management & Insurance, Florida State University"
  site-url: "https://evaneastman.com"

  navbar:
    pinned: true
    right:
      - href: index.qmd
        text: About
      - href: research.qmd
        text: Research
      - href: teaching.qmd
        text: Teaching
      - href: cv.qmd
        text: CV

  page-footer:
    left: "© 2026 Evan M. Eastman"
    right:
      - icon: envelope
        href: "mailto:eeastman@wertheim.fsu.edu"

format:
  html:
    theme:
      - cosmo
      - styles.scss
    toc: false
    fontsize: 1.05em
    linkcolor: "#782F40"   # FSU garnet — swap for any accent you prefer
    grid:
      body-width: 850px
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap">
